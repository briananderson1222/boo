name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run Kiro code review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -e 's/{{PR_NUMBER}}/${{ github.event.pull_request.number }}/g' \
              -e 's|{{REPO}}|${{ github.repository }}|g' \
              .kiro/prompts/code-review.md \
          | kiro-cli chat --no-interactive --trust-all-tools "Follow the code review instructions below."
