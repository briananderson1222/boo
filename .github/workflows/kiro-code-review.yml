name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run Kiro code review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          kiro-cli --agent code-reviewer chat --no-interactive --trust-all-tools \
            "Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}"

      - name: Verify review was posted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENTS=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '[.comments[] | select(.body | contains("Generated with [Kiro CLI]"))] | length')
          if [ "$COMMENTS" -eq 0 ]; then
            echo "::error::Kiro code review did not post a comment. Review may have failed silently."
            exit 1
          fi
