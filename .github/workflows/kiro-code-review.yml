name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Run Kiro code review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          kiro-cli chat --agent code-reviewer --no-interactive \
            "Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}"

      - name: Check review results
        run: |
          REVIEW=$(ls -t .kiro/reviews/*.json 2>/dev/null | head -1)
          if [ -z "$REVIEW" ]; then
            echo "::error::No review output found in .kiro/reviews/"
            exit 1
          fi
          ISSUES=$(jq -e '.issues_found // empty' "$REVIEW") || {
            echo "::error::Review JSON missing or invalid 'issues_found' field"
            exit 1
          }
          echo "Review: $REVIEW"
          echo "Issues found: $ISSUES"
          jq '.' "$REVIEW"
          if [ "$ISSUES" -gt 0 ]; then
            exit 1
          fi
