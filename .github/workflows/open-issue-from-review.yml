name: Open Issue from Review

on:
  issue_comment:
    types: [created]

jobs:
  open-issue:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/open-issue')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Parse and create issue
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          FINDING_NUM=$(echo "$COMMENT_BODY" | grep -oP '(?<=/open-issue\s)\d+' | head -1)
          if [ -z "$FINDING_NUM" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ Usage: \`/open-issue <number>\` where number matches a finding from the review."
            exit 0
          fi

          # Find the most recent review containing REVIEW_DATA that was posted
          # BEFORE this /open-issue comment (so it references the right review)
          COMMENT_ID=${{ github.event.comment.id }}
          REVIEW_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq "[.[] | select(.body | contains(\"REVIEW_DATA\")) | {id: .id, body: .body}] | sort_by(.id) | map(select(.id < $COMMENT_ID)) | last | .body" \
            | grep -oP '(?<=<!-- REVIEW_DATA: ).*(?= -->)' || true)

          # Fallback: if no review found before this comment, try the latest one
          if [ -z "$REVIEW_JSON" ]; then
            REVIEW_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
              --jq '[.[] | select(.body | contains("REVIEW_DATA"))] | last | .body' \
              | grep -oP '(?<=<!-- REVIEW_DATA: ).*(?= -->)' || true)
          fi

          if [ -z "$REVIEW_JSON" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ No review data found. The review comment may be missing the embedded findings."
            exit 0
          fi

          FINDING=$(echo "$REVIEW_JSON" | jq --argjson n "$FINDING_NUM" '.[$n - 1] // empty')
          if [ -z "$FINDING" ]; then
            TOTAL=$(echo "$REVIEW_JSON" | jq 'length')
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ Finding #$FINDING_NUM not found. The last review has $TOTAL finding(s)."
            exit 0
          fi

          FILE=$(echo "$FINDING" | jq -r '.file')
          LINE=$(echo "$FINDING" | jq -r '.line')
          DESC=$(echo "$FINDING" | jq -r '.description')
          SEVERITY=$(echo "$FINDING" | jq -r '.severity')
          CONFIDENCE=$(echo "$FINDING" | jq -r '.confidence')
          SOURCE=$(echo "$FINDING" | jq -r '.source')
          SHORT_DESC="${DESC:0:80}"

          # Check for existing issue with same title prefix to prevent duplicates
          EXISTING=$(gh issue list --repo "$REPO" --label "code-review" --state open \
            --search "Code review: ${SHORT_DESC}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "> **[${SEVERITY}]** ${SHORT_DESC}...

          ℹ️ Finding #$FINDING_NUM already tracked in issue #$EXISTING."
            exit 0
          fi

          ISSUE_URL=$(gh issue create --repo "$REPO" \
            --title "Code review: $SHORT_DESC" \
            --body "Found during review of PR #$PR_NUMBER.

          **Severity:** $SEVERITY
          **Confidence:** $CONFIDENCE
          **File:** \`$FILE#L$LINE\`
          **Source:** $SOURCE

          $DESC

          ---
          *Auto-created from [code review](https://github.com/$REPO/pull/$PR_NUMBER).*" \
            --label "code-review")

          ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oP '\d+$')
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "✅ Created issue #$ISSUE_NUM for finding #$FINDING_NUM."
