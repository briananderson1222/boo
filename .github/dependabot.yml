version: 2
updates:
  # Keeps SHA-pinned actions current (updates the pin + version comment)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
